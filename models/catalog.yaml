    engine: ollama
    ollama_tag: "llama3.2:1b"
    description: "Ultra-fast, minimal resource usage. Great for simple tasks and edge devices."
    tags: [fast, chat]
    quants: [q4_K_M, q8_0]
    default_quant: q4_K_M
    max_ctx: 131072
    default_ctx: 8192

