name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.22"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build release binaries ───────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            suffix: linux-amd64
          - os: linux
            arch: arm64
            suffix: linux-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: cli/go.sum

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binary
        working-directory: cli
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          mkdir -p ../dist
          go build -trimpath \
            -ldflags="-s -w \
              -X 'github.com/workhubonline-soft/aistack/cmd.version=${VERSION}' \
              -X 'github.com/workhubonline-soft/aistack/cmd.commit=${COMMIT}' \
              -X 'github.com/workhubonline-soft/aistack/cmd.buildDate=${BUILD_DATE}'" \
            -o ../dist/aistack-${{ matrix.suffix }} \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aistack-${{ matrix.suffix }}
          path: dist/aistack-${{ matrix.suffix }}

  # ── Create GitHub Release ────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum aistack-* > checksums.txt
          cat checksums.txt

      - name: Make binaries executable
        run: chmod +x dist/aistack-*

      - name: Generate release notes
        id: notes
        run: |
          # Extract latest section from CHANGELOG if it exists
          if [ -f CHANGELOG.md ]; then
            awk '/^## \['"${{ steps.version.outputs.VERSION }}"'\]/{found=1; next} found && /^## \[/{exit} found{print}' CHANGELOG.md > /tmp/release_notes.md
          fi

          # Auto-generate from git log if no changelog
          if [ ! -s /tmp/release_notes.md ]; then
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" > /tmp/release_notes.md
            else
              echo "Initial release" > /tmp/release_notes.md
            fi
          fi
          echo "NOTES_FILE=/tmp/release_notes.md" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "AIStack ${{ steps.version.outputs.VERSION }}"
          body_path: ${{ steps.notes.outputs.NOTES_FILE }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-rc') || contains(steps.version.outputs.VERSION, '-beta') || contains(steps.version.outputs.VERSION, '-alpha') }}
          files: |
            dist/aistack-linux-amd64
            dist/aistack-linux-arm64
            dist/checksums.txt
          generate_release_notes: false

      - name: Update install.sh version pointer
        run: |
          echo "Latest release: ${{ steps.version.outputs.VERSION }}"
          echo "Install URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/aistack-linux-amd64"

  # ── Docker image ─────────────────────────────────────────────────────────────
  docker:
    name: Docker Image
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download linux/amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: aistack-linux-amd64
          path: dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}

  # ── Update install.sh latest pointer ────────────────────────────────────────
  update-installer:
    name: Update installer latest version
    needs: release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update version in install.sh
        run: |
          sed -i "s/AISTACK_VERSION:-latest/AISTACK_VERSION:-${{ steps.version.outputs.VERSION }}/g" install.sh
          # Verify change
          grep "AISTACK_VERSION" install.sh

      - name: Commit updated install.sh
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add install.sh
          git diff --staged --quiet || git commit -m "chore: bump installer version to ${{ steps.version.outputs.VERSION }}"
          git push origin HEAD:main || true
